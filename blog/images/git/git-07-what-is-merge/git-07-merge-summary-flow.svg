<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git merge 기본 흐름 요약</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">분리된 작업 브랜치의 변경 내용을 다시 기준 브랜치에 합친다</text>

  <line x1="140" y1="220" x2="440" y2="220" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />
  <path d="M440 220 C520 220, 540 160, 620 140" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" />
  <line x1="620" y1="140" x2="860" y2="140" stroke="#34d399" stroke-width="6" stroke-linecap="round" />
  <path d="M860 140 C930 150, 950 200, 1020 220" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
  <line x1="440" y1="220" x2="1060" y2="220" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />

  <circle cx="440" cy="220" r="12" fill="#60a5fa" />
  <circle cx="620" cy="140" r="12" fill="#34d399" />
  <circle cx="860" cy="140" r="12" fill="#34d399" />
  <circle cx="1020" cy="220" r="12" fill="#f59e0b" />

  <text x="220" y="255" text-anchor="middle" font-size="18" font-weight="700" fill="#e5e7eb">main</text>
  <text x="745" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#d1fae5">feature branch</text>
  <text x="1020" y="198" text-anchor="middle" font-size="15" fill="#fde68a">merge 결과</text>
  <text x="480" y="190" text-anchor="middle" font-size="15" fill="#bfdbfe">분기</text>

  <rect x="210" y="306" width="780" height="60" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="343" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 흐름: 브랜치 분리 → 별도 작업 → main으로 돌아와 merge</text>
</svg>

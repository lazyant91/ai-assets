<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git merge, fast-forward와 conflict</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">어떤 때는 바로 합쳐지고, 어떤 때는 사람이 직접 정리해야 한다</text>

  <rect x="110" y="130" width="430" height="190" rx="20" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="325" y="168" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">fast-forward</text>
  <line x1="170" y1="230" x2="470" y2="230" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />
  <line x1="290" y1="190" x2="470" y2="190" stroke="#34d399" stroke-width="6" stroke-linecap="round" />
  <circle cx="290" cy="230" r="10" fill="#60a5fa" />
  <circle cx="470" cy="190" r="10" fill="#34d399" />
  <text x="220" y="258" text-anchor="middle" font-size="16" fill="#e5e7eb">main</text>
  <text x="430" y="168" text-anchor="middle" font-size="16" fill="#d1fae5">feature가 앞서감</text>
  <text x="325" y="288" text-anchor="middle" font-size="16" fill="#cbd5e1">기준 브랜치가 최신 위치로 따라감</text>

  <rect x="660" y="130" width="430" height="190" rx="20" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="875" y="168" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">conflict</text>
  <line x1="720" y1="230" x2="1030" y2="230" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />
  <line x1="810" y1="190" x2="930" y2="190" stroke="#34d399" stroke-width="6" stroke-linecap="round" />
  <circle cx="810" cy="230" r="10" fill="#60a5fa" />
  <circle cx="930" cy="190" r="10" fill="#34d399" />
  <text x="770" y="258" text-anchor="middle" font-size="16" fill="#e5e7eb">main도 수정</text>
  <text x="930" y="168" text-anchor="middle" font-size="16" fill="#d1fae5">feature도 수정</text>
  <text x="875" y="288" text-anchor="middle" font-size="16" fill="#cbd5e1">같은 부분이 다르면 직접 정리 필요</text>

  <rect x="240" y="356" width="720" height="56" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="391" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 자동으로 따라가면 fast-forward, 판단이 어려우면 conflict</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git 실무 관례와 네이밍 감각 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">Git은 명령어만 아는 것보다 브랜치, 커밋, PR을 읽기 좋게 남기는 관례를 익히면 훨씬 실무적으로 써먹기 쉬워진다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">브랜치 이름</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">feature, fix 등</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">무슨 작업인지 보이게</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">커밋 메시지</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">짧고 분명하게</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">변경 내용이 보이게</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">작업 단위</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">너무 크게 묶지 않기</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">읽기 쉬운 기록</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">PR/리뷰</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">제목과 설명 정리</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">흐름 공유</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="100" y="450" width="1000" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 실무 Git은 복잡한 비법보다</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">다른 사람이 읽기 쉬운 이름과 기록을 남기는 관례를 지키는 데서 시작한다</text></svg>
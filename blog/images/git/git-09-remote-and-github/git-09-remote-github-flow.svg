<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">원격 저장소와 GitHub 연결 흐름</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">로컬 저장소를 원격 저장소와 연결하면 백업과 공유, 협업이 가능해진다</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa" />
    </marker>
  </defs>

  <rect x="100" y="145" width="220" height="120" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="210" y="185" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">1. 로컬 저장소</text>
  <text x="210" y="218" text-anchor="middle" font-size="16" fill="#cbd5e1">내 PC에서 작업</text>
  <text x="210" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">commit 기록 보유</text>

  <rect x="390" y="145" width="220" height="120" rx="18" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="500" y="185" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">2. 원격 등록</text>
  <text x="500" y="218" text-anchor="middle" font-size="16" fill="#cbd5e1">git remote add</text>
  <text x="500" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">origin 연결</text>

  <rect x="680" y="145" width="220" height="120" rx="18" fill="#1e293b" stroke="#34d399" stroke-width="2" />
  <text x="790" y="185" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">3. GitHub</text>
  <text x="790" y="218" text-anchor="middle" font-size="16" fill="#cbd5e1">원격 저장소 생성</text>
  <text x="790" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">외부 백업 / 공유</text>

  <rect x="970" y="145" width="130" height="120" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
  <text x="1035" y="185" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">push</text>
  <text x="1035" y="218" text-anchor="middle" font-size="16" fill="#cbd5e1">로컬 → 원격</text>
  <text x="1035" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">업로드</text>

  <line x1="320" y1="205" x2="390" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="610" y1="205" x2="680" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="900" y1="205" x2="970" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />

  <rect x="220" y="312" width="760" height="56" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="347" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 로컬에서 커밋하고, 원격을 연결한 뒤 GitHub로 push한다</text>
</svg>

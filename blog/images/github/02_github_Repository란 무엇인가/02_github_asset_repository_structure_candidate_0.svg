<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-mint" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#92DCE5"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FFD166"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1100" height="620" fill="#2B303A"/>
  <text x="550" y="58" text-anchor="middle" fill="#EEE5E9" font-size="30" font-family="Arial, sans-serif" font-weight="700">Repository 구조</text>
  <text x="550" y="92" text-anchor="middle" fill="#BFC7D5" font-size="16" font-family="Arial, sans-serif">로컬 저장소와 GitHub 원격 저장소의 관계</text>

  <rect x="90" y="170" width="350" height="270" rx="22" fill="#20262F" stroke="#4A5563" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="215" text-anchor="middle" fill="#92DCE5" font-size="24" font-family="Arial, sans-serif" font-weight="700">Local Repository</text>
  <text x="265" y="246" text-anchor="middle" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif">내 컴퓨터의 작업 공간</text>

  <rect x="135" y="290" width="260" height="44" rx="10" fill="#2B303A" stroke="#92DCE5" stroke-width="2"/>
  <text x="265" y="318" text-anchor="middle" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif">edit / add / commit</text>

  <circle cx="205" cy="382" r="20" fill="#92DCE5"/>
  <text x="205" y="389" text-anchor="middle" fill="#2B303A" font-size="13" font-family="Arial, sans-serif" font-weight="700">A</text>
  <circle cx="265" cy="382" r="20" fill="#92DCE5"/>
  <text x="265" y="389" text-anchor="middle" fill="#2B303A" font-size="13" font-family="Arial, sans-serif" font-weight="700">B</text>
  <circle cx="325" cy="382" r="20" fill="#92DCE5"/>
  <text x="325" y="389" text-anchor="middle" fill="#2B303A" font-size="13" font-family="Arial, sans-serif" font-weight="700">C</text>
  <line x1="225" y1="382" x2="245" y2="382" stroke="#92DCE5" stroke-width="4"/>
  <line x1="285" y1="382" x2="305" y2="382" stroke="#92DCE5" stroke-width="4"/>

  <rect x="660" y="170" width="350" height="270" rx="22" fill="#20262F" stroke="#4A5563" stroke-width="2" filter="url(#shadow)"/>
  <text x="835" y="215" text-anchor="middle" fill="#FFD166" font-size="24" font-family="Arial, sans-serif" font-weight="700">GitHub Repository</text>
  <text x="835" y="246" text-anchor="middle" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif">온라인 원격 저장소</text>

  <rect x="705" y="290" width="260" height="44" rx="10" fill="#2B303A" stroke="#FFD166" stroke-width="2"/>
  <text x="835" y="318" text-anchor="middle" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif">code / README / issues</text>

  <rect x="715" y="360" width="100" height="42" rx="10" fill="#2B303A" stroke="#06D6A0" stroke-width="2"/>
  <text x="765" y="386" text-anchor="middle" fill="#EEE5E9" font-size="14" font-family="Arial, sans-serif">PR</text>
  <rect x="855" y="360" width="100" height="42" rx="10" fill="#2B303A" stroke="#06D6A0" stroke-width="2"/>
  <text x="905" y="386" text-anchor="middle" fill="#EEE5E9" font-size="14" font-family="Arial, sans-serif">Issue</text>

  <line x1="455" y1="265" x2="645" y2="265" stroke="#92DCE5" stroke-width="5" marker-end="url(#arrow-mint)"/>
  <text x="550" y="244" text-anchor="middle" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif" font-weight="700">Push</text>

  <line x1="645" y1="350" x2="455" y2="350" stroke="#FFD166" stroke-width="5" marker-end="url(#arrow-yellow)"/>
  <text x="550" y="377" text-anchor="middle" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif" font-weight="700">Clone / Pull</text>

  <rect x="160" y="505" width="780" height="70" rx="18" fill="#20262F" stroke="#4A5563" stroke-width="2"/>
  <circle cx="205" cy="540" r="8" fill="#92DCE5"/>
  <text x="228" y="546" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif">Local: 직접 작업하고 commit하는 공간</text>
  <circle cx="580" cy="540" r="8" fill="#FFD166"/>
  <text x="603" y="546" fill="#EEE5E9" font-size="15" font-family="Arial, sans-serif">Remote: 공유와 협업을 위한 온라인 저장소</text>
</svg>